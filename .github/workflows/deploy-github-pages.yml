name: Deploy Bookkeeping to GitHub Pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - src/**
      - public/**
      - angular.json
      - federation.config.js
      - package.json
      - package-lock.json
      - tsconfig.app.json
      - tsconfig.federation.json
      - tsconfig.json
      - tsconfig.spec.json
      - .github/workflows/deploy-github-pages.yml
  workflow_dispatch:
    inputs:
      comparison_profile:
        description: Compare cold or warm CI baseline
        required: true
        default: warm
        type: choice
        options:
          - cold
          - warm

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NG_PERSISTENT_BUILD_CACHE: 1
      NODE_OPTIONS: --max-old-space-size=6144

    steps:
      - name: Resolve comparison profile
        id: comparison-profile
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PROFILE="${{ github.event.inputs.comparison_profile }}"
          else
            PROFILE="warm"
          fi

          echo "profile=$PROFILE" >> "$GITHUB_OUTPUT"
          echo "Using comparison profile: $PROFILE"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js (warm cache)
        if: steps.comparison-profile.outputs.profile == 'warm'
        uses: actions/setup-node@v6
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Node.js (cold baseline)
        if: steps.comparison-profile.outputs.profile == 'cold'
        uses: actions/setup-node@v6
        with:
          node-version: 20.19.0

      - name: Restore node_modules cache
        if: steps.comparison-profile.outputs.profile == 'warm'
        id: cache-node-modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-bookkeeping-node-20.19.0-${{ hashFiles('package-lock.json') }}

      - name: Restore Angular cache
        if: steps.comparison-profile.outputs.profile == 'warm'
        uses: actions/cache@v5
        with:
          path: .angular/cache
          key: ${{ runner.os }}-angular-bookkeeping-${{ hashFiles('package-lock.json', 'angular.json', 'federation.config.js', 'tsconfig*.json') }}
          restore-keys: |
            ${{ runner.os }}-angular-bookkeeping-

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        shell: bash
        run: |
          echo "Install mode: ${{ steps.comparison-profile.outputs.profile }}"
          if [ "${{ steps.comparison-profile.outputs.profile }}" = "warm" ] && [ "${{ steps.cache-node-modules.outputs.cache-hit }}" = "true" ]; then
            echo "node_modules cache hit — skipping npm ci"
          else
            npm ci --no-audit --no-fund
          fi

      - name: Restore Native Federation cache
        if: steps.comparison-profile.outputs.profile == 'warm'
        uses: actions/cache@v5
        with:
          path: node_modules/.cache/native-federation
          key: ${{ runner.os }}-native-federation-bookkeeping-${{ hashFiles('package-lock.json', 'angular.json', 'federation.config.js', 'tsconfig*.json') }}
          restore-keys: |
            ${{ runner.os }}-native-federation-bookkeeping-

      - name: Build Angular app
        run: npm run build -- --configuration production --base-href "/M11275709_angular-mf-bookkeeping/"

      - name: Bundle size report
        shell: bash
        run: |
          DIST="dist/bookkeeping/browser"
          IDX_FILES=$(grep -oE '[a-zA-Z0-9._-]+\.js' "$DIST/index.html" 2>/dev/null | sort -u)
          in_index() { echo "$IDX_FILES" | grep -qF "$(basename "$1")"; }
          MAIN_B=0; POLY_B=0; CSS_B=0; EAGER_B=0; LAZY_B=0

          echo ""
          echo "  M11275709 Angular MF — bookkeeping"
          echo "  =================================="

          echo ""
          echo "  [main]"
          for f in "$DIST"/main*.js; do
            [ -f "$f" ] || continue
            b=$(wc -c < "$f"); MAIN_B=$((MAIN_B+b))
            printf "    %8.1f kB  %s\n" "$(awk "BEGIN{printf \"%.1f\",$b/1024}")" "$(basename "$f")"
          done

          echo ""
          echo "  [polyfills]"
          for f in "$DIST"/polyfills*.js; do
            [ -f "$f" ] || continue
            b=$(wc -c < "$f"); POLY_B=$((POLY_B+b))
            printf "    %8.1f kB  %s\n" "$(awk "BEGIN{printf \"%.1f\",$b/1024}")" "$(basename "$f")"
          done

          echo ""
          echo "  [chunks — referenced in index.html (eager)]"
          for f in $(find "$DIST" -maxdepth 1 -name "chunk-*.js" | sort); do
            [ -f "$f" ] || continue
            if in_index "$f"; then
              b=$(wc -c < "$f"); EAGER_B=$((EAGER_B+b))
              printf "    %8.1f kB  %s\n" "$(awk "BEGIN{printf \"%.1f\",$b/1024}")" "$(basename "$f")"
            fi
          done

          echo ""
          echo "  [styles]"
          for f in "$DIST"/styles*.css; do
            [ -f "$f" ] || continue
            b=$(wc -c < "$f"); CSS_B=$((CSS_B+b))
            printf "    %8.1f kB  %s\n" "$(awk "BEGIN{printf \"%.1f\",$b/1024}")" "$(basename "$f")"
          done

          echo ""
          echo "  [chunks — lazy loaded]"
          for f in $(find "$DIST" -maxdepth 1 -name "chunk-*.js" | sort); do
            [ -f "$f" ] || continue
            if ! in_index "$f"; then
              b=$(wc -c < "$f"); LAZY_B=$((LAZY_B+b))
              printf "    %8.1f kB  %s\n" "$(awk "BEGIN{printf \"%.1f\",$b/1024}")" "$(basename "$f")"
            fi
          done

          LOGIC_B=$((MAIN_B+EAGER_B))
          echo ""
          echo "=================================="
          printf "  main.js              : %8.1f kB\n" "$(awk "BEGIN{printf \"%.1f\",$MAIN_B/1024}")"
          printf "  polyfills            : %8.1f kB\n" "$(awk "BEGIN{printf \"%.1f\",$POLY_B/1024}")"
          printf "  styles.css           : %8.1f kB\n" "$(awk "BEGIN{printf \"%.1f\",$CSS_B/1024}")"
          printf "  eager chunks (index) : %8.1f kB\n" "$(awk "BEGIN{printf \"%.1f\",$EAGER_B/1024}")"
          printf "  lazy chunks          : %8.1f kB\n" "$(awk "BEGIN{printf \"%.1f\",$LAZY_B/1024}")"
          echo "  ----------------------------------"
          printf "  Application logic    : %8.1f kB  (main + eager chunks)\n" "$(awk "BEGIN{printf \"%.1f\",$LOGIC_B/1024}")"
          echo "=================================="
      - name: Prepare Pages artifact
        shell: bash
        run: |
          cp dist/bookkeeping/browser/index.html dist/bookkeeping/browser/404.html
          touch dist/bookkeeping/browser/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist/bookkeeping/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
